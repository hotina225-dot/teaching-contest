<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{overflow-x:hidden;}
body{font-family:'Noto Sans TC',sans-serif;background:#F7F9FF;color:#1A1A18;padding-top:60px;}
.nav-wrapper{position:fixed;top:0;left:0;width:100%;z-index:1000;transition:transform 0.3s ease;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:60px;background:#fff;border-bottom:2px solid #E8581A;width:100%;}
.nav-brand{display:flex;align-items:center;gap:9px;text-decoration:none;}
.nav-name{font-size:15px;font-weight:700;color:#1A1A18;}
.nav-sub{font-size:12px;color:#A0A09A;display:block;}
.nav-links{display:flex;gap:3px;list-style:none;align-items:center;}
.nav-links li a{font-size:14px;color:#555;text-decoration:none;padding:5px 10px;border-radius:6px;}
.nav-links li a:hover{color:#E8581A;}
.nav-links li a.active{font-weight:700;color:#E8581A;}
.nav-reg{background:#E8581A !important;color:#fff !important;font-weight:700 !important;border-radius:6px !important;padding:7px 14px !important;}
.nav-dropdown{position:relative;}
.nav-submenu{display:none;position:absolute;top:100%;left:0;background:#fff;border:1px solid #EEE;border-radius:8px;min-width:160px;padding:6px 0;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
.nav-submenu li{list-style:none;}
.nav-submenu li a{display:block;padding:8px 16px;font-size:13px;color:#555;border-radius:0;}
.nav-submenu li a:hover{background:#FFF3EE;color:#E8581A;}
.nav-dropdown:hover .nav-submenu{display:block;}
.nav-hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;padding:6px;background:none;border:none;}
.nav-hamburger span{display:block;width:22px;height:2px;background:#1A1A18;border-radius:2px;}
.nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1998;}
.nav-overlay.open{display:block;}
.nav-drawer{position:fixed;top:0;left:0;height:100%;width:72%;max-width:300px;background:#1A1A18;z-index:1999;transform:translateX(-100%);transition:transform 0.3s ease;display:flex;flex-direction:column;overflow-y:auto;}
.nav-drawer.open{transform:translateX(0);}
.nav-drawer-close{display:flex;align-items:center;padding:1.25rem 1.25rem 0.75rem;background:none;border:none;cursor:pointer;color:#fff;font-size:22px;align-self:flex-start;}
.nav-drawer a{font-size:16px;color:#fff;text-decoration:none;padding:14px 1.5rem;border-bottom:1px solid rgba(255,255,255,0.08);display:block;}
.nav-drawer a:hover{background:rgba(255,255,255,0.08);}
.nav-drawer a.active{font-weight:700;color:#E8A070;}
.mob-sub{font-size:14px !important;color:#AAA !important;padding:11px 1.5rem 11px 2.5rem !important;background:rgba(0,0,0,0.2);}
.mob-reg{background:#E8581A !important;color:#fff !important;font-weight:700;text-align:center;margin:1rem 1.25rem;border-radius:8px;padding:13px !important;border-bottom:none !important;display:block;}
@media(max-width:768px){.nav-links{display:none;}.nav-hamburger{display:flex;}nav{padding:0 1.25rem;}}

.page-hero{background:linear-gradient(135deg,#CAE9FF 0%,#B0D8F5 100%);padding:3.5rem 2.5rem 2.5rem;text-align:center;width:100%;}
.page-label{font-size:11px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#E8581A;margin-bottom:0.5rem;display:block;}
h1.page-title{font-family:'Noto Serif TC',serif;font-size:34px;font-weight:700;color:#0D3A5E;margin-bottom:0.5rem;}
.page-desc{font-size:14px;color:#3A6A8A;}
.wave{display:block;width:100%;height:50px;}

.section{padding:4rem 2.5rem;max-width:800px;margin:0 auto;text-align:center;}
.coming-soon-icon{font-size:64px;margin-bottom:1.5rem;}
.coming-soon-title{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;color:#0D3A5E;margin-bottom:0.75rem;}
.coming-soon-desc{font-size:15px;color:#5A88A8;line-height:1.8;}

footer{padding:1.25rem 2.5rem;border-top:2px solid #E8581A;display:flex;justify-content:space-between;background:#CAE9FF;}
.footer-t{font-size:13px;color:#4A7A9A;}
@media(max-width:768px){footer{flex-direction:column;gap:6px;}.section{padding:3rem 1.25rem;}}
</style>
</head>

<script>
const navWrapper = document.querySelector('.nav-wrapper');
let lastY = 0;
window.addEventListener('scroll', function(){
  if(window.innerWidth <= 768) return;
  const y = window.scrollY;
  navWrapper.style.transform = (y > lastY && y > 80) ? 'translateY(-100%)' : 'translateY(0)';
  lastY = y;
}, {passive:true});
document.addEventListener('mousemove', function(e){
  if(window.innerWidth <= 768) return;
  if(e.clientY < 20) navWrapper.style.transform = 'translateY(0)';
});
function openDrawer(){
  document.getElementById('navDrawer').classList.add('open');
  document.getElementById('navOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer(){
  document.getElementById('navDrawer').classList.remove('open');
  document.getElementById('navOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
